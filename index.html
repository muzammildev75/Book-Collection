<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment</title>
  <style>
    .section {
      margin: auto;
      background: #ffffff;
      padding: 50px;
    }

    .section h2 {
      text-align: center;
      font-size: 40px;
      color: #1f3c88;
    }

    .section h2 span {
      color: #2bb0ed;
    }
    .cards {
      display: flex;
      flex-wrap: wrap;
    }

    .card {
  background: #ffffff;
  width: 25%; /* 4 cards per row */
  padding: 15px;
  cursor: pointer;
  box-sizing:border-box;
  border: 2px solid #ddd;
}

.card:hover {
  border: 2px solid #2bb0ed;
}
    .card img {
      width: 50%;
      display: flex;
      justify-self:center;
    }

    .card h4 {
      margin: 8px 0 5px;
      font-size: 15px;
    }

    .rating {
      color: #f4b400;
      font-size: 14px;
      
    }

    .price {
      color: #2bb0ed;
      font-weight: bold;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="section">
    <h2><span>Action & Adventure</span><br>Collection</h2>

    <div class="cards">
      <div class="card">
        <img src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1650755924i/60869516.jpg" alt="Book">
        <h4>Into the Wild</h4>
        <div class="rating">★★★★★</div>
        <div class="price">Rs:1000</div>
      </div>

      <div class="card">
        <img src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1677855142i/63063857.jpg" alt="Book" />
        <h4>Dark Horizon</h4>
        <div class="rating">★★★★☆</div>
        <div class="price">Rs: 1199 </div>
      </div>

      <div class="card">
        <img src="https://www.bookalooza.com/designer/storage/books/68ed0670823a912547e1c34a/rj2ezdm4.png" alt="Book" />
        <h4>Last Mission</h4>
        <div class="rating">★★★★★</div>
        <div class="price">Rs: 899</div>
      </div>

      <div class="card">
        <img src="https://alexrider.com/wp-content/webp-express/webp-images/uploads/2019/04/GN-stormbreaker.png.webp" alt="Book" />
        <h4>Storm Breaker</h4>
        <div class="rating">★★★★☆</div>
        <div class="price">Rs: 999 </div>
      </div>
          <div class="card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQBNAuDsrygFsepsA4KnWNNeA3NIUfHXLJdMw&s" alt="Book" />
        <h4>Hidden Kingdom</h4>
        <div class="rating">★★★★★</div>
        <div class="price">Rs: 1399</div>
      </div>

      <div class="card">
        <img src="https://i.ebayimg.com/images/g/exUAAOSwvYZnjnnp/s-l1200.png" alt="Book" />
        <h4>Edge of War</h4>
        <div class="rating">★★★★☆</div>
        <div class="price">Rs: 1099</div>
      </div>

      <div class="card">
        <img src="https://m.media-amazon.com/images/I/61UZS3QA1UL.jpg" alt="Book" />
        <h4>48 laws of Power</h4>
        <div class="rating">★★★★★</div>
        <div class="price">Rs: 899</div>
      </div>

      <div class="card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRnZHaKM8T2Tvf0tGyNz6XcEIdVnpqC96Bd2Q&s" alt="Book" />
        <h4>The Escape Artist</h4>
        <div class="rating">★★★★☆</div>
        <div class="price">Rs: 1199</div>
      </div>
    </div>
  </div>

</body>
</html>
